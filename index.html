<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>間 · Interval Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', Georgia, serif;
      background: #d6eaf5;
      min-height: 100vh;
      color: #2c2c2c;
      overflow-x: hidden;
    }

    /* ── Cloud Background ── */
    #clouds-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #clouds-bg svg {
      width: 100%;
      height: 100%;
    }

    /* ── App Shell ── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 3.5rem 2.5rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 4.5rem;
    }
    .header-ma {
      font-family: 'Noto Serif JP', serif;
      font-size: 5rem;
      font-weight: 200;
      color: #1a1a2e;
      line-height: 1;
      letter-spacing: 0.05em;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: #4a4a5a;
      margin-top: 0.7rem;
    }
    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #8a8a9a;
      letter-spacing: 0.2em;
      margin-top: 0.3rem;
    }

    /* ── Project Cards — frameless, open layout ── */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      margin-bottom: 2.5rem;
    }
    .project-card {
      cursor: pointer;
      padding: 0.25rem 0;
      transition: opacity 0.25s;
      user-select: none;
    }
    .project-card:hover { opacity: 0.82; }
    .project-card.is-active { opacity: 1; }

    .project-kanji {
      font-family: 'Noto Serif JP', serif;
      font-size: 3.8rem;
      font-weight: 200;
      color: #1a1a2e;
      line-height: 1;
      margin-bottom: 0.55rem;
    }
    .project-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: #2c2c2c;
      margin-bottom: 0.25rem;
    }
    .project-desc {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: #6a6a7a;
      letter-spacing: 0.08em;
      line-height: 1.55;
      margin-bottom: 1.2rem;
    }

    /* Progress bar */
    .progress-track {
      height: 1.5px;
      background: #b8d9ee;
      margin-bottom: 0.7rem;
      position: relative;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #c9a84c;
      transition: width 0.5s ease;
    }
    .project-stats {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #9a9aaa;
    }
    .stat-done { color: #c9a84c; }

    /* Active indicator — subtle gold line under kanji */
    .project-card.is-active .project-kanji::after {
      content: '';
      display: block;
      width: 2rem;
      height: 1.5px;
      background: #c9a84c;
      margin-top: 0.4rem;
    }

    /* ── Workspace ── */
    #workspace {
      display: none;
      padding-top: 2.5rem;
      border-top: 1px solid rgba(184, 217, 238, 0.7);
      margin-top: 0.5rem;
      animation: fadeIn 0.3s ease;
    }
    #workspace.is-visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ws-header {
      display: flex;
      align-items: baseline;
      gap: 1.1rem;
      margin-bottom: 2rem;
    }
    .ws-kanji {
      font-family: 'Noto Serif JP', serif;
      font-size: 2.6rem;
      font-weight: 200;
      color: #1a1a2e;
      line-height: 1;
    }
    .ws-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: #2c2c2c;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 2.8rem;
      margin-bottom: 2.2rem;
    }
    .tab-btn {
      background: none;
      border: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #aaaabc;
      cursor: pointer;
      padding: 0 0 0.3rem;
      border-bottom: 1.5px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.is-active {
      color: #c9a84c;
      border-bottom-color: #c9a84c;
    }
    .tab-btn:hover:not(.is-active) { color: #555; }

    .tab-pane { display: none; }
    .tab-pane.is-active { display: block; }

    /* ── Plan Tab ── */
    .add-form {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
      align-items: flex-end;
    }
    .add-form input {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 1px solid #b8d9ee;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      padding: 0.45rem 0;
      color: #2c2c2c;
      outline: none;
      letter-spacing: 0.05em;
      transition: border-color 0.2s;
    }
    .add-form input::placeholder { color: #b0b0c0; }
    .add-form input:focus { border-bottom-color: #c9a84c; }

    .btn {
      background: none;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.88rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.4rem 1.1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #c9a84c; color: #fff; }

    .task-list { list-style: none; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(184, 217, 238, 0.35);
    }
    .task-item:last-child { border-bottom: none; }

    .task-check {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      border: 1px solid #c9a84c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .task-check.is-done { background: #c9a84c; }
    .task-check.is-done::after {
      content: '✓';
      color: #fff;
      font-size: 9px;
      line-height: 1;
    }
    .task-text {
      flex: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.04em;
      color: #2c2c2c;
      transition: color 0.2s;
      line-height: 1.5;
    }
    .task-text.is-done {
      text-decoration: line-through;
      color: #b0b0b8;
    }
    .btn-icon {
      background: none;
      border: none;
      color: #d0d0d8;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0 0.2rem;
      transition: color 0.2s;
      line-height: 1;
    }
    .btn-icon:hover { color: #c9a84c; }

    .empty-state {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.92rem;
      color: #b8b8c8;
      letter-spacing: 0.1em;
      padding: 0.5rem 0;
    }

    /* ── Reflect Tab ── */
    .insight-form { margin-bottom: 2rem; }
    .insight-form textarea {
      width: 100%;
      min-height: 110px;
      background: rgba(184, 217, 238, 0.15);
      border: none;
      border-bottom: 1px solid #b8d9ee;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      line-height: 1.65;
      padding: 0.75rem 0.5rem;
      color: #2c2c2c;
      outline: none;
      resize: vertical;
      letter-spacing: 0.04em;
      transition: border-color 0.2s;
    }
    .insight-form textarea::placeholder { color: #b0b0c0; }
    .insight-form textarea:focus { border-bottom-color: #c9a84c; }
    .insight-form .btn { margin-top: 0.7rem; }

    .insight-list { list-style: none; }
    .insight-item {
      padding: 1.1rem 0;
      border-bottom: 1px solid rgba(184, 217, 238, 0.35);
      position: relative;
    }
    .insight-item:last-child { border-bottom: none; }
    .insight-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 0.35rem;
    }
    .insight-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.97rem;
      color: #3c3c4c;
      line-height: 1.68;
      letter-spacing: 0.03em;
      padding-right: 1.5rem;
    }
    .insight-del {
      position: absolute;
      top: 1rem;
      right: 0;
      background: none;
      border: none;
      color: #d0d0d8;
      cursor: pointer;
      font-size: 0.85rem;
      transition: color 0.2s;
      line-height: 1;
    }
    .insight-del:hover { color: #c9a84c; }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 6rem;
      padding-bottom: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #b0b0c0;
    }

    /* ── Responsive ── */
    @media (max-width: 620px) {
      .projects-grid { grid-template-columns: 1fr; gap: 3rem; }
      .header-ma { font-size: 4rem; }
      .app { padding: 2.5rem 1.5rem 3rem; }
    }
  </style>
</head>

  <!-- ══ App ══ -->
  <div class="app">
    <header>
      <div class="header-ma">間</div>
      <div class="header-title">Interval Tracker</div>
      <div class="header-sub">meaningful intervals · 意味のある間</div>
    </header>

    <section class="projects-grid" id="projects-grid"></section>
    <section id="workspace"></section>

    <footer>間 · 2025</footer>
  </div>

  <script>
    'use strict';

    /* ── Project definitions ── */
    const PROJECTS = [
      {
        id: 'geopolitical',
        kanji: '知',
        name: 'Geopolitical Lens',
        desc: "A friend's interpretations of geopolitical & economic events"
      },
      {
        id: 'narrative',
        kanji: '語',
        name: 'Narrative Interpreter',
        desc: 'Long-term personal narrative tracking'
      }
    ];

    /* ── State ── */
    const state = {
      selected: null,      // project id or null
      activeTab: {}        // { [projectId]: 'plan' | 'reflect' }
    };

    /* ── Storage ── */
    function loadProject(id) {
      try {
        return JSON.parse(localStorage.getItem('ma_' + id)) || { tasks: [], insights: [] };
      } catch (_) {
        return { tasks: [], insights: [] };
      }
    }

    function saveProject(id, data) {
      localStorage.setItem('ma_' + id, JSON.stringify(data));
    }

    /* ── Helpers ── */
    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-GB', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function stats(id) {
      const d = loadProject(id);
      return {
        planned: d.tasks.length,
        done: d.tasks.filter(t => t.done).length,
        insights: d.insights.length
      };
    }

    function progress(id) {
      const s = stats(id);
      return s.planned === 0 ? 0 : Math.round((s.done / s.planned) * 100);
    }

    /* ── Render project cards ── */
    function renderCards() {
      const grid = document.getElementById('projects-grid');
      grid.innerHTML = '';

      PROJECTS.forEach(proj => {
        const s = stats(proj.id);
        const pct = progress(proj.id);
        const active = state.selected === proj.id;

        const card = document.createElement('div');
        card.className = 'project-card' + (active ? ' is-active' : '');
        card.innerHTML =
          '<div class="project-kanji">' + proj.kanji + '</div>' +
          '<div class="project-name">' + esc(proj.name) + '</div>' +
          '<div class="project-desc">' + esc(proj.desc) + '</div>' +
          '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="project-stats">' +
            s.planned + ' planned\u2002·\u2002' +
            '<span class="stat-done">' + s.done + ' done</span>' +
            '\u2002·\u2002' + s.insights + ' insights' +
          '</div>';

        card.addEventListener('click', () => {
          if (state.selected === proj.id) {
            state.selected = null;
          } else {
            state.selected = proj.id;
            if (!state.activeTab[proj.id]) state.activeTab[proj.id] = 'plan';
          }
          render();
        });

        grid.appendChild(card);
      });
    }

    /* ── Render workspace ── */
    function renderWorkspace() {
      const ws = document.getElementById('workspace');

      if (!state.selected) {
        ws.classList.remove('is-visible');
        ws.innerHTML = '';
        return;
      }

      const proj = PROJECTS.find(p => p.id === state.selected);
      const tab = state.activeTab[proj.id] || 'plan';
      const data = loadProject(proj.id);

      const taskRows = data.tasks.length
        ? data.tasks.map(t =>
            '<li class="task-item" data-tid="' + t.id + '">' +
              '<div class="task-check' + (t.done ? ' is-done' : '') + '" data-check="' + t.id + '"></div>' +
              '<span class="task-text' + (t.done ? ' is-done' : '') + '">' + esc(t.text) + '</span>' +
              '<button class="btn-icon" data-del-task="' + t.id + '" title="Remove">\u2715</button>' +
            '</li>'
          ).join('')
        : '<li class="empty-state">No tasks yet. Add one above.</li>';

      const insightRows = data.insights.length
        ? data.insights.slice().reverse().map(ins =>
            '<li class="insight-item">' +
              '<button class="insight-del" data-del-ins="' + ins.id + '" title="Remove">\u2715</button>' +
              '<div class="insight-date">' + esc(formatDate(ins.date)) + '</div>' +
              '<div class="insight-text">' + esc(ins.text) + '</div>' +
            '</li>'
          ).join('')
        : '<li class="empty-state">No reflections yet.</li>';

      ws.innerHTML =
        '<div class="ws-header">' +
          '<span class="ws-kanji">' + proj.kanji + '</span>' +
          '<span class="ws-name">' + esc(proj.name) + '</span>' +
        '</div>' +
        '<div class="tabs">' +
          '<button class="tab-btn' + (tab === 'plan' ? ' is-active' : '') + '" data-tab="plan">Plan</button>' +
          '<button class="tab-btn' + (tab === 'reflect' ? ' is-active' : '') + '" data-tab="reflect">Reflect</button>' +
        '</div>' +

        /* ── Plan pane ── */
        '<div class="tab-pane' + (tab === 'plan' ? ' is-active' : '') + '" id="pane-plan">' +
          '<div class="add-form">' +
            '<input type="text" id="task-input" placeholder="Add a task or milestone\u2026" autocomplete="off" />' +
            '<button class="btn" id="task-add">Add</button>' +
          '</div>' +
          '<ul class="task-list" id="task-list">' + taskRows + '</ul>' +
        '</div>' +

        /* ── Reflect pane ── */
        '<div class="tab-pane' + (tab === 'reflect' ? ' is-active' : '') + '" id="pane-reflect">' +
          '<div class="insight-form">' +
            '<textarea id="insight-input" placeholder="Record an insight or reflection\u2026"></textarea>' +
            '<button class="btn" id="insight-add">Save insight</button>' +
          '</div>' +
          '<ul class="insight-list" id="insight-list">' + insightRows + '</ul>' +
        '</div>';

      ws.classList.add('is-visible');

      /* ── Tab switching ── */
      ws.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeTab[proj.id] = btn.dataset.tab;
          render();
        });
      });

      /* ── Plan: add task ── */
      const taskInput = document.getElementById('task-input');
      const taskAdd   = document.getElementById('task-add');

      function addTask() {
        const text = taskInput.value.trim();
        if (!text) return;
        const d = loadProject(proj.id);
        d.tasks.push({ id: uid(), text, done: false, createdAt: new Date().toISOString() });
        saveProject(proj.id, d);
        render();
      }

      taskAdd.addEventListener('click', addTask);
      taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

      /* ── Plan: toggle done ── */
      ws.querySelectorAll('[data-check]').forEach(el => {
        el.addEventListener('click', () => {
          const d = loadProject(proj.id);
          const task = d.tasks.find(t => t.id === el.dataset.check);
          if (task) task.done = !task.done;
          saveProject(proj.id, d);
          render();
        });
      });

      /* ── Plan: delete task ── */
      ws.querySelectorAll('[data-del-task]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          const d = loadProject(proj.id);
          d.tasks = d.tasks.filter(t => t.id !== el.dataset.delTask);
          saveProject(proj.id, d);
          render();
        });
      });

      /* ── Reflect: add insight ── */
      const insightInput = document.getElementById('insight-input');
      const insightAdd   = document.getElementById('insight-add');

      insightAdd.addEventListener('click', () => {
        const text = insightInput.value.trim();
        if (!text) return;
        const d = loadProject(proj.id);
        d.insights.push({ id: uid(), text, date: new Date().toISOString() });
        saveProject(proj.id, d);
        render();
      });

      /* ── Reflect: delete insight ── */
      ws.querySelectorAll('[data-del-ins]').forEach(el => {
        el.addEventListener('click', () => {
          const d = loadProject(proj.id);
          d.insights = d.insights.filter(ins => ins.id !== el.dataset.delIns);
          saveProject(proj.id, d);
          render();
        });
      });
    }

    /* ── Main render ── */
    function render() {
      renderCards();
      renderWorkspace();
    }

    render();
  </script>
</body>
</html>
